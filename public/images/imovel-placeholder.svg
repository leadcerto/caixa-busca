<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#EBF3FB"/>

  <!-- Grid de fundo sutil -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#D6E8F5" stroke-width="1"/>
  </pattern>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Casa simplificada -->
  <g transform="translate(260, 120)">
    <!-- Telhado -->
    <polygon points="140,0 280,120 0,120" fill="#005CA9" opacity="0.15"/>
    <polygon points="140,10 270,120 10,120" fill="#005CA9" opacity="0.25"/>

    <!-- Corpo da casa -->
    <rect x="30" y="120" width="220" height="160" rx="4" fill="#005CA9" opacity="0.12"/>
    <rect x="30" y="120" width="220" height="160" rx="4" stroke="#005CA9" stroke-width="2" stroke-opacity="0.2" fill="none"/>

    <!-- Porta -->
    <rect x="110" y="200" width="60" height="80" rx="4" fill="#005CA9" opacity="0.2"/>
    <circle cx="162" cy="242" r="4" fill="#005CA9" opacity="0.4"/>

    <!-- Janela esquerda -->
    <rect x="50" y="150" width="55" height="45" rx="3" fill="#F39200" opacity="0.2"/>
    <line x1="77" y1="150" x2="77" y2="195" stroke="#F39200" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="50" y1="172" x2="105" y2="172" stroke="#F39200" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- Janela direita -->
    <rect x="175" y="150" width="55" height="45" rx="3" fill="#F39200" opacity="0.2"/>
    <line x1="202" y1="150" x2="202" y2="195" stroke="#F39200" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="175" y1="172" x2="230" y2="172" stroke="#F39200" stroke-width="1.5" stroke-opacity="0.3"/>
  </g>

  <!-- Texto principal -->
  <text x="400" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#005CA9" opacity="0.6" text-anchor="middle" letter-spacing="1">IMÓVEL CAIXA ECONÔMICA FEDERAL</text>

  <!-- Subtexto -->
  <text x="400" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#005CA9" opacity="0.35" text-anchor="middle">Imagem não disponível</text>

  <!-- Linha decorativa -->
  <line x1="300" y1="450" x2="500" y2="450" stroke="#F39200" stroke-width="2" opacity="0.3"/>

  <!-- Logo Antigravity (texto) -->
  <text x="400" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#F39200" opacity="0.5" text-anchor="middle" letter-spacing="3">ANTIGRAVITY</text>
</svg>
