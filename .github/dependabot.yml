# Dependabot
#
# Este arquivo configura atualizações automáticas de dependências no GitHub.
#
# Mantemos ativo por padrão:
# - GitHub Actions
#
# Ative outros ecossistemas somente se o projeto realmente possuir os arquivos correspondentes.
#
# Documentação oficial:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # GitHub Actions
  #
  # Atualiza versões de actions usadas em:
  # .github/workflows/*.yml
  # .github/workflows/*.yaml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  # npm / Node.js
