name: Deploy Laravel to venda.imoveisdacaixa.com.br

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REMOTE_PATH: /var/www/venda

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build front-end assets (Vite + Tailwind)
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host %s\n  Port %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' \
            "${{ secrets.SSH_HOST }}" "${{ secrets.SSH_PORT }}" >> ~/.ssh/config

      - name: Sync files to server
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="storage" \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$REMOTE_PATH/"

      - name: Post-deploy commands
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "REMOTE_PATH='$REMOTE_PATH' bash -s" << 'ENDSSH'
            set -e
            cd "$REMOTE_PATH"

            # Garante estrutura de storage (inclui tmp do Livewire)
            mkdir -p storage/app/public
            mkdir -p storage/app/livewire-tmp
            mkdir -p storage/app/imports
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            mkdir -p bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Cria .env se não existir (primeira deploy)
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "AVISO: .env criado — configure as variáveis e rode migrations manualmente!"
            fi

            # Gera APP_KEY se ainda não foi gerada
            if grep -q 'APP_KEY=$' .env || grep -qE 'APP_KEY=""' .env; then
              php artisan key:generate --force
            fi

            # Symlink storage → public/storage
            php artisan storage:link --force 2>/dev/null || true

            # Migrations e cache
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Aumenta limite de upload no nginx
            echo "client_max_body_size 100M;" | sudo tee /etc/nginx/conf.d/upload-limit.conf > /dev/null
            sudo nginx -t && sudo systemctl reload nginx

            # Aumenta limites de upload no PHP-FPM (evita "failed to upload" no CSV)
            PHP_INI=$(php --ini | grep "Loaded Configuration" | awk '{print $NF}')
            if [ -f "$PHP_INI" ]; then
              sudo sed -i 's/^upload_max_filesize.*/upload_max_filesize = 50M/' "$PHP_INI"
              sudo sed -i 's/^post_max_size.*/post_max_size = 50M/' "$PHP_INI"
              # Adiciona se não existir
              grep -q '^upload_max_filesize' "$PHP_INI" || echo 'upload_max_filesize = 50M' | sudo tee -a "$PHP_INI" > /dev/null
              grep -q '^post_max_size' "$PHP_INI" || echo 'post_max_size = 50M' | sudo tee -a "$PHP_INI" > /dev/null
            fi
            # Também via conf.d para garantir (sobrepõe php.ini)
            printf 'upload_max_filesize = 50M\npost_max_size = 50M\n' | sudo tee /etc/php/8.4/fpm/conf.d/99-upload.ini > /dev/null

            # Reinicia PHP-FPM para aplicar novos limites
            sudo systemctl restart php8.4-fpm

            echo "✅ Deploy concluído."
          ENDSSH
