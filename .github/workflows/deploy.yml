name: Deploy via FTP - Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v6

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: 📥 Install Dependencies (Composer)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: 📝 Create dummy .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🏗️ Install Dependencies (NPM)
        run: |
          npm install
          npm run build

      - name: 📂 Sync files via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          protocol: sftp
          server-dir: ./
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
            **/storage/framework/sessions/**
            .env
            composer.phar
            composer-setup.php
            phpunit.xml
            README.md
            TECH_STACK.md
            REQUISITOS.md
            AI_GUIDELINES.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            PHILOSOPHY.md
            KNOWLEDGE_BASE_MENTOR.md
            Pendencias.txt
            analise de contexto.md
            arquitetura.md
            banco-de-dados.md
            design-ui-ux.md
            integracoes.md
            integracoes_funcionais.md
            visao-explicativa.md
            visao-geral.md
            docs/**
            referencias/**
