name: Deploy Laravel to venda.imoveisdacaixa.com.br

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REMOTE_PATH: /var/www/venda

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build front-end assets (Vite + Tailwind)
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host %s\n  Port %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' \
            "${{ secrets.SSH_HOST }}" "${{ secrets.SSH_PORT }}" >> ~/.ssh/config

      - name: Sync files to staging dir (home do usuário SSH)
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="storage" \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/venda-staging/"

      - name: Post-deploy commands
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "REMOTE_PATH='$REMOTE_PATH' bash -s" << 'ENDSSH'
            set -e

            # Copia staging → /var/www/venda (root não precisa de sudo)
            mkdir -p "$REMOTE_PATH"
            rsync -a --delete \
              --exclude=".env" \
              --exclude="storage" \
              ~/venda-staging/ "$REMOTE_PATH/"

            cd "$REMOTE_PATH"

            # Garante estrutura de storage
            mkdir -p storage/app/public storage/app/imports
            mkdir -p storage/framework/cache/data storage/framework/sessions
            mkdir -p storage/framework/views storage/logs bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Cria .env se não existir (primeira deploy)
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "AVISO: .env criado — configure as variáveis manualmente!"
            fi

            # Gera APP_KEY se ainda não foi gerada
            if grep -q 'APP_KEY=$' .env || grep -qE 'APP_KEY=""' .env; then
              php artisan key:generate --force
            fi

            php artisan storage:link --force 2>/dev/null || true

            # Migrations e cache
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:clear
            php artisan view:cache
            php artisan event:cache

            # Nginx e PHP-FPM (não-fatais)
            echo "client_max_body_size 100M;" | tee /etc/nginx/conf.d/upload-limit.conf > /dev/null 2>&1 || true
            nginx -t 2>/dev/null && systemctl reload nginx 2>/dev/null || true
            printf 'upload_max_filesize = 50M\npost_max_size = 50M\n' \
              | tee /etc/php/8.4/fpm/conf.d/99-upload.ini > /dev/null 2>&1 || true
            systemctl restart php8.4-fpm 2>/dev/null || systemctl reload php8.4-fpm 2>/dev/null || true

            echo "✅ Deploy concluído."
          ENDSSH
