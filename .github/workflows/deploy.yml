name: Deploy Laravel Ideal via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v6

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: 📥 Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🏗️ Install NPM & Build
        run: |
          npm install
          npm run build

      - name: 📝 Adjust index.php for split folder structure (Subfolder version)
        run: |
          # public_html → symlink → domains/vendainfinita.com.br/public_html
          # Caminho real: ~/public_html/venda/public → sobe 3 níveis para ~/laravel-app
          sed -i "s|require __DIR__.'/../vendor/autoload.php'|require __DIR__.'/../../../laravel-app/vendor/autoload.php'|g" public/index.php
          sed -i "s|\$app = require_once __DIR__.'/../bootstrap/app.php'|\$app = require_once __DIR__.'/../../../laravel-app/bootstrap/app.php'|g" public/index.php

      - name: 🔑 Setup SSH Key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📂 Sync Laravel App Core
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'public' \
            --exclude '.env' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/laravel-app/

      - name: 📂 Sync Public Folder to /venda/public
        run: |
          # public_html é symlink — usar caminho relativo ao home
          ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /home/${{ secrets.SSH_USER }}/public_html/venda/public"
          
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./public/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/public_html/venda/public/

      - name: ⚡ Run Post-Deployment Commands
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /home/${{ secrets.SSH_USER }}/laravel-app
            
            # PHP 8.4 na Hostinger (caminho confirmado)
            PHP_BIN="/opt/alt/php84/usr/bin/php"
            echo "Using PHP binary: $PHP_BIN"
            
            # Restauração ou criação do .env de produção
            if [ ! -f /home/${{ secrets.SSH_USER }}/laravel-app/.env ]; then
                echo "=== PROCURANDO ARQUIVO .ENV ANTIGO NO SERVIDOR ==="
                FOUND_ENV=""
                for PATH_OPT in \
                  "/home/${{ secrets.SSH_USER }}/public_html/venda/.env" \
                  "/home/${{ secrets.SSH_USER }}/public_html/venda/public/.env" \
                  "/home/${{ secrets.SSH_USER }}/domains/imoveisdacaixa.com.br/public_html/venda/.env" \
                  "/home/${{ secrets.SSH_USER }}/domains/imoveisdacaixa.com.br/public_html/venda/public/.env"; do
                    if [ -f "$PATH_OPT" ]; then
                        FOUND_ENV="$PATH_OPT"
                        break
                    fi
                done
                
                if [ -n "$FOUND_ENV" ]; then
                    echo "Arquivo .env antigo encontrado em: $FOUND_ENV"
                    echo "Copiando para laravel-app/.env..."
                    cp "$FOUND_ENV" /home/${{ secrets.SSH_USER }}/laravel-app/.env
                    chmod 644 /home/${{ secrets.SSH_USER }}/laravel-app/.env
                else
                    echo "AVISO: Nenhum arquivo .env antigo foi encontrado no servidor!"
                    echo "Criando um novo arquivo .env com base no .env.example..."
                    cp /home/${{ secrets.SSH_USER }}/laravel-app/.env.example /home/${{ secrets.SSH_USER }}/laravel-app/.env
                    chmod 644 /home/${{ secrets.SSH_USER }}/laravel-app/.env
                    $PHP_BIN artisan key:generate --force
                fi
            else
                echo "Arquivo .env ja existe em laravel-app/.env"
                chmod 644 /home/${{ secrets.SSH_USER }}/laravel-app/.env
            fi

            $PHP_BIN artisan storage:link || true
            $PHP_BIN artisan migrate --force
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache

            # Ajuste de permissões em pastas de escrita
            chmod -R 775 storage bootstrap/cache || true

            # Limpeza de arquivos de teste (em ambos os caminhos possíveis)
            rm /home/${{ secrets.SSH_USER }}/public_html/venda/rastreio.txt || true
            rm /home/${{ secrets.SSH_USER }}/domains/imoveisdacaixa.com.br/public_html/venda/rastreio.txt || true
          EOF

