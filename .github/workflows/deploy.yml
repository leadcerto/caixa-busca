name: Deploy Laravel to venda.imoveisdacaixa.com.br

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REMOTE_PATH: /home/u541302702/domains/imoveisdacaixa.com.br/public_html/venda

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build front-end assets (Vite + Tailwind)
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host %s\n  Port %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' \
            "${{ secrets.SSH_HOST }}" "${{ secrets.SSH_PORT }}" >> ~/.ssh/config

      - name: Sync files to server
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="storage" \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$REMOTE_PATH/"

      - name: Post-deploy commands
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "REMOTE_PATH='$REMOTE_PATH' bash -s" << 'ENDSSH'
            set -e
            cd "$REMOTE_PATH"

            # Garante estrutura de storage
            mkdir -p storage/app/public
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            mkdir -p bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Cria .env se não existir
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "AVISO: .env criado a partir do .env.example — configure as variáveis!"
            fi

            # Symlink storage → public/storage
            php artisan storage:link --force 2>/dev/null || true

            # Migrations e cache
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "✅ Deploy concluído."
          ENDSSH
