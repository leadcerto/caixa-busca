name: Deploy Laravel to venda.imoveisdacaixa.com.br

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build front-end assets (Vite + Tailwind)
        run: |
          npm ci
          npm run build

      - name: Debug secrets (tamanhos, sem revelar valores)
        run: |
          echo "SSH_HOST  length: ${#SSH_HOST}"
          echo "SSH_PORT  length: ${#SSH_PORT}"
          echo "SSH_USER  length: ${#SSH_USER}"
          echo "SSH_KEY   length: ${#SSH_PRIVATE_KEY}"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Test TCP connectivity
        run: |
          nc -zv -w 10 ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} \
            && echo "✅ TCP OK" \
            || echo "❌ TCP FAILED"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host %s\n  Port %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' \
            "${{ secrets.SSH_HOST }}" "${{ secrets.SSH_PORT }}" >> ~/.ssh/config

      - name: Sync files to staging dir (home do root no VPS)
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="storage" \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/venda-staging/"

      - name: Post-deploy commands
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e

            # Encontra o container Laravel pelo prefixo estável do Coolify
            APP=$(docker ps --format '{{.Names}}' | grep '^qvwxmlvmu1zlwzcc' | head -1)
            if [ -z "$APP" ]; then
              echo "ERRO: container do app não encontrado"
              docker ps --format '{{.Names}}'
              exit 1
            fi
            echo "Deployando para container: $APP"

            # Copia arquivos do staging para dentro do container
            docker cp ~/venda-staging/. "$APP":/var/www/html/

            # Garante estrutura de storage dentro do container
            docker exec "$APP" mkdir -p \
              /var/www/html/storage/app/public \
              /var/www/html/storage/app/imports \
              /var/www/html/storage/framework/cache/data \
              /var/www/html/storage/framework/sessions \
              /var/www/html/storage/framework/views \
              /var/www/html/storage/logs \
              /var/www/html/bootstrap/cache

            docker exec "$APP" chown -R www-data:www-data \
              /var/www/html/storage \
              /var/www/html/bootstrap/cache
            docker exec "$APP" chmod -R 775 \
              /var/www/html/storage \
              /var/www/html/bootstrap/cache

            # Artisan
            docker exec "$APP" php artisan migrate --force
            docker exec "$APP" php artisan config:cache
            docker exec "$APP" php artisan route:cache
            docker exec "$APP" php artisan view:clear
            docker exec "$APP" php artisan view:cache
            docker exec "$APP" php artisan event:cache

            echo "✅ Deploy concluído."
          ENDSSH
