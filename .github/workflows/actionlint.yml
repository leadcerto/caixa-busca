name: Actionlint

on:
  push:
    branches:
      - main
      - master
      - develop
      - staging
      - production
    paths:
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - master
      - develop
      - staging
      - production
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Validate GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Actionlint
        uses: raven-actions/actionlint@v2
        with:
          files: ".github/workflows/*.yml"
