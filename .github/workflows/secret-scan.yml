name: Secret Scan

on:
  push:
    branches:
      - main
      - master
      - develop
      - staging
      - production
  pull_request:
    branches:
      - main
      - master
      - develop
      - staging
      - production
  schedule:
    - cron: "30 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan secrets with Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
