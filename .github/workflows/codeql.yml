name: CodeQL

on:
  push:
    branches:
      - main
      - master
      - develop
      - staging
      - production
  pull_request:
    branches:
      - main
      - master
      - develop
      - staging
      - production
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze code with CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect JavaScript and TypeScript files
        id: detect-js-ts
        if: ${{ matrix.language == 'javascript-typescript' }}
        shell: bash
        run: |
          if find . \
            -path "./.git" -prune -o \
            -type f \( \
              -name "*.js" -o \
              -name "*.jsx" -o \
              -name "*.ts" -o \
              -name "*.tsx" -o \
              -name "*.mjs" -o \
              -name "*.cjs" \
            \) -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Python files
        id: detect-python
        if: ${{ matrix.language == 'python' }}
        shell: bash
        run: |
          if find . \
            -path "./.git" -prune -o \
            -type f -name "*.py" -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: >-
          ${{
            steps.detect-js-ts.outputs.found == 'true' ||
            steps.detect-python.outputs.found == 'true'
          }}
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        if: >-
          ${{
            steps.detect-js-ts.outputs.found == 'true' ||
            steps.detect-python.outputs.found == 'true'
          }}
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      - name: Skip analysis when language is not detected
        if: >-
          ${{
            steps.detect-js-ts.outputs.found == 'false' ||
            steps.detect-python.outputs.found == 'false'
          }}
        shell: bash
        run: |
          echo "No files detected for language: ${{ matrix.language }}."
          echo "Skipping CodeQL analysis for this language."
